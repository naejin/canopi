<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <script>
      try {
        const cachedTheme = localStorage.getItem("canopi-theme");
        if (cachedTheme === "light" || cachedTheme === "dark") {
          document.documentElement.setAttribute("data-theme", cachedTheme);
        }
      } catch {
        // The cache is optional; platform settings hydrate after module startup.
      }
    </script>
    <link
      rel="icon"
      type="image/svg+xml"
      href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' rx='14' fill='%23f5efe2'/%3E%3Cpath d='M32 48c9-7 15-15 15-26-8 0-13 3-15 9-2-6-7-9-15-9 0 11 6 19 15 26z' fill='%23a06b1f'/%3E%3C/svg%3E"
    />
    <title>Canopi</title>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="/src/main.web.tsx"></script>
  </body>
</html>
