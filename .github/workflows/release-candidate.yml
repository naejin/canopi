name: Release Candidate

on:
  workflow_dispatch:
    inputs:
      ref:
        description: Git ref to build
        required: true
        default: main
        type: string
      release_version:
        description: Expected version from desktop/tauri.conf.json
        required: true
        type: string
      db_release_tag:
        description: GitHub release tag containing the bundled DB asset
        required: true
        default: canopi-core-db
        type: string

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

jobs:
  preflight:
    runs-on: ubuntu-latest
    outputs:
      head_sha: ${{ steps.head.outputs.head_sha }}
      db_sha256: ${{ steps.db.outputs.db_sha256 }}
      db_asset_name: ${{ steps.schema.outputs.db_asset_name }}
      expected_schema_version: ${{ steps.schema.outputs.expected_schema_version }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref }}

      - id: head
        name: Capture build commit
        shell: bash
        run: |
          set -euo pipefail
          echo "Resolving commit for ref '${{ inputs.ref }}'"
          echo "head_sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"

      - id: version
        name: Verify release version metadata
        shell: bash
        run: |
          set -euo pipefail
          requested_version="${{ inputs.release_version }}"
          REQUESTED_VERSION="$requested_version" python3 - <<'PY'
          import json
          import os
          import re
          import sys
          from pathlib import Path

          requested_version = os.environ["REQUESTED_VERSION"]

          def read_json_version(path: str) -> str:
              data = json.loads(Path(path).read_text())
              version = data.get("version")
              if not isinstance(version, str) or not version:
                  raise SystemExit(f"::error::{path} must define a non-empty string version.")
              return version

          def read_package_lock_root_version(path: str) -> str:
              data = json.loads(Path(path).read_text())
              root = data.get("packages", {}).get("")
              version = root.get("version") if isinstance(root, dict) else None
              if not isinstance(version, str) or not version:
                  raise SystemExit(f"::error::{path} packages[''] must define a non-empty string version.")
              return version

          def read_cargo_workspace_version(path: str) -> str:
              text = Path(path).read_text()
              match = re.search(r"(?ms)^\[workspace\.package\]\s*(?P<body>.*?)(?:^\[|\Z)", text)
              if not match:
                  raise SystemExit(f"::error::{path} must define [workspace.package].")
              version_match = re.search(r'(?m)^\s*version\s*=\s*"([^"]+)"\s*$', match.group("body"))
              if not version_match:
                  raise SystemExit(f"::error::{path} [workspace.package] must define version.")
              return version_match.group(1)

          versions = {
              "desktop/tauri.conf.json": read_json_version("desktop/tauri.conf.json"),
              "Cargo.toml [workspace.package]": read_cargo_workspace_version("Cargo.toml"),
              "desktop/web/package.json": read_json_version("desktop/web/package.json"),
              "desktop/web/package-lock.json": read_json_version("desktop/web/package-lock.json"),
              "desktop/web/package-lock.json packages['']": read_package_lock_root_version("desktop/web/package-lock.json"),
          }

          print(f"Requested release version: {requested_version}")
          for source, version in versions.items():
              print(f"{source}: {version}")

          tauri_version = versions["desktop/tauri.conf.json"]
          failed = False
          if tauri_version != requested_version:
              print(
                  f"::error::desktop/tauri.conf.json version '{tauri_version}' does not match workflow input '{requested_version}'.",
                  file=sys.stderr,
              )
              failed = True

          for source, version in versions.items():
              if source == "desktop/tauri.conf.json":
                  continue
              if version != tauri_version:
                  print(
                      f"::error::{source} version '{version}' does not match desktop/tauri.conf.json version '{tauri_version}'.",
                      file=sys.stderr,
                  )
                  failed = True

          if failed:
              raise SystemExit(1)
          PY

      - id: schema
        name: Read expected plant DB schema version
        shell: bash
        run: |
          set -euo pipefail
          python3 scripts/species_catalog_contract.py check
          expected_schema_version="$(python3 scripts/species_catalog_contract.py value prepared-schema-version)"
          db_asset_name="$(python3 scripts/species_catalog_contract.py value prepared-db-asset-name)"
          echo "Expected bundled DB schema version: $expected_schema_version"
          echo "Compiled bundled DB asset: $db_asset_name"
          echo "expected_schema_version=$expected_schema_version" >> "$GITHUB_OUTPUT"
          echo "db_asset_name=$db_asset_name" >> "$GITHUB_OUTPUT"

      - name: Download bundled plant DB
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p preflight
          echo "Downloading bundled DB '${{ steps.schema.outputs.db_asset_name }}' from release tag '${{ inputs.db_release_tag }}'"
          gh release download "${{ inputs.db_release_tag }}" \
            --repo "$GITHUB_REPOSITORY" \
            --pattern "${{ steps.schema.outputs.db_asset_name }}" \
            --dir preflight
          db_path="preflight/${{ steps.schema.outputs.db_asset_name }}"
          if [[ ! -s "$db_path" ]]; then
            echo "::error::Bundled DB asset '$db_path' was not downloaded or is empty."
            exit 1
          fi
          echo "Downloaded bundled DB to $db_path"

      - id: db
        name: Verify bundled DB schema and checksum
        shell: bash
        run: |
          set -euo pipefail
          db_path="preflight/${{ steps.schema.outputs.db_asset_name }}"
          expected_schema_version="${{ steps.schema.outputs.expected_schema_version }}"
          python3 scripts/species_catalog_contract.py verify-db --profile prepared "$db_path"
          echo "Bundled DB schema verified at version: $expected_schema_version"
          db_sha256="$(sha256sum "$db_path" | awk '{print $1}')"
          echo "Bundled DB sha256: $db_sha256"
          echo "db_sha256=$db_sha256" >> "$GITHUB_OUTPUT"

      - name: Write preflight summary
        shell: bash
        run: |
          {
            echo "## Release Candidate Preflight"
            echo
            echo "- Ref: \`${{ inputs.ref }}\`"
            echo "- Commit: \`${{ steps.head.outputs.head_sha }}\`"
            echo "- Release version: \`${{ inputs.release_version }}\`"
            echo "- DB tag: \`${{ inputs.db_release_tag }}\`"
            echo "- DB asset: \`${{ steps.schema.outputs.db_asset_name }}\`"
            echo "- Expected DB schema: \`${{ steps.schema.outputs.expected_schema_version }}\`"
            echo "- DB sha256: \`${{ steps.db.outputs.db_sha256 }}\`"
          } >> "$GITHUB_STEP_SUMMARY"

  build:
    needs: preflight
    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            bundle_args: --bundles deb appimage
          - os: macos-14
            target: aarch64-apple-darwin
            bundle_args: ""
          - os: macos-15-intel
            target: x86_64-apple-darwin
            bundle_args: ""
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            bundle_args: ""

    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.preflight.outputs.head_sha }}

      - id: rust-toolchain
        uses: dtolnay/rust-toolchain@1.97.1
        with:
          targets: ${{ matrix.target }}

      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ steps.rust-toolchain.outputs.cachekey }}-${{ hashFiles('**/Cargo.lock') }}

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        uses: ./.github/actions/install-linux-deps

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: desktop/web/package-lock.json

      - name: Install frontend deps
        run: npm ci --prefix desktop/web

      - name: Download bundled plant DB
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail
          asset_name="${{ needs.preflight.outputs.db_asset_name }}"
          download_dir="$(mktemp -d)"
          trap 'rm -rf "$download_dir"' EXIT
          mkdir -p desktop/resources
          echo "Fetching bundled DB '$asset_name' for target '${{ matrix.target }}'"
          gh release download "${{ inputs.db_release_tag }}" \
            --repo "$GITHUB_REPOSITORY" \
            --pattern "$asset_name" \
            --dir "$download_dir"
          downloaded_db_path="$download_dir/$asset_name"
          if [[ ! -s "$downloaded_db_path" ]]; then
            echo "::error::Bundled DB asset '$downloaded_db_path' is missing or empty before packaging target '${{ matrix.target }}'."
            exit 1
          fi
          db_path="desktop/resources/canopi-core.db"
          mv "$downloaded_db_path" "$db_path"
          if [[ ! -s "$db_path" ]]; then
            echo "::error::Bundled DB asset '$db_path' is missing or empty before packaging target '${{ matrix.target }}'."
            exit 1
          fi
          expected_db_sha256="${{ needs.preflight.outputs.db_sha256 }}"
          actual_db_sha256="$(
            DB_PATH="$db_path" node <<'NODE'
          const crypto = require("node:crypto");
          const fs = require("node:fs");

          const hash = crypto.createHash("sha256");
          fs.createReadStream(process.env.DB_PATH)
            .on("data", (chunk) => hash.update(chunk))
            .on("error", (error) => {
              console.error(error);
              process.exit(1);
            })
            .on("end", () => process.stdout.write(hash.digest("hex")));
          NODE
          )"
          if [[ "$actual_db_sha256" != "$expected_db_sha256" ]]; then
            echo "::error::Bundled DB checksum changed after preflight for target '${{ matrix.target }}': expected $expected_db_sha256, found $actual_db_sha256."
            exit 1
          fi
          echo "Bundled DB checksum matches preflight: $actual_db_sha256"

      - name: Build Tauri app
        run: npx --prefix desktop/web @tauri-apps/cli build --target ${{ matrix.target }} ${{ matrix.bundle_args }}

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: canopi-${{ matrix.target }}
          path: |
            target/${{ matrix.target }}/release/bundle/**/*.deb
            target/${{ matrix.target }}/release/bundle/**/*.AppImage
            target/${{ matrix.target }}/release/bundle/**/*.dmg
            target/${{ matrix.target }}/release/bundle/**/*.msi
            target/${{ matrix.target }}/release/bundle/**/*.exe
          if-no-files-found: error
          retention-days: 30

  manifest:
    needs: [preflight, build]
    runs-on: ubuntu-latest
    steps:
      - name: Download packaged artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: canopi-*
          path: artifacts

      - name: Generate checksum manifest
        shell: bash
        env:
          BUILD_REF: ${{ inputs.ref }}
          BUILD_VERSION: ${{ inputs.release_version }}
          DB_ASSET_NAME: ${{ needs.preflight.outputs.db_asset_name }}
          DB_RELEASE_TAG: ${{ inputs.db_release_tag }}
          DB_SHA256: ${{ needs.preflight.outputs.db_sha256 }}
          EXPECTED_SCHEMA_VERSION: ${{ needs.preflight.outputs.expected_schema_version }}
          HEAD_SHA: ${{ needs.preflight.outputs.head_sha }}
          REPOSITORY: ${{ github.repository }}
        run: |
          set -euo pipefail
          (
            cd artifacts
            find . -type f \( \
              -name '*.deb' -o \
              -name '*.AppImage' -o \
              -name '*.dmg' -o \
              -name '*.msi' -o \
              -name '*.exe' \
            \) -print | sort | xargs sha256sum
          ) > SHA256SUMS.txt

          if [[ ! -s SHA256SUMS.txt ]]; then
            echo "::error::No packaged artifacts were found when generating SHA256SUMS.txt."
            exit 1
          fi

          python3 - <<'PY'
          import json
          import os
          from pathlib import Path

          metadata = {
              "repository": os.environ["REPOSITORY"],
              "ref": os.environ["BUILD_REF"],
              "head_sha": os.environ["HEAD_SHA"],
              "release_version": os.environ["BUILD_VERSION"],
              "db_release_tag": os.environ["DB_RELEASE_TAG"],
              "db_asset_name": os.environ["DB_ASSET_NAME"],
              "db_sha256": os.environ["DB_SHA256"],
              "expected_db_schema_version": int(os.environ["EXPECTED_SCHEMA_VERSION"]),
          }
          Path("release-metadata.json").write_text(json.dumps(metadata, indent=2) + "\n")
          PY

      - name: Write manifest summary
        shell: bash
        run: |
          {
            echo "## Release Candidate Artifacts"
            echo
            echo "- Commit: \`${{ needs.preflight.outputs.head_sha }}\`"
            echo "- Version: \`${{ inputs.release_version }}\`"
            echo "- Packaged artifact checksums: \`SHA256SUMS.txt\`"
            echo "- Bundled DB checksum: \`${{ needs.preflight.outputs.db_sha256 }}\`"
            echo "- Promotion command: \`scripts/promote-release.sh --run-id ${{ github.run_id }} --tag <tag> --title <title>\`"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload release-candidate manifest
        uses: actions/upload-artifact@v4
        with:
          name: canopi-release-candidate-manifest
          path: |
            SHA256SUMS.txt
            release-metadata.json
          if-no-files-found: error
          retention-days: 30
