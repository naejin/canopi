name: Build & Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  CANOPI_CORE_DB_RELEASE_TAG: canopi-core-db
  CANOPI_CORE_DB_ASSET_NAME: canopi-core.db

jobs:
  lint:
    runs-on: ubuntu-latest
    env:
      CANOPI_SKIP_BUNDLED_DB: "1"
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Install Linux dependencies
        uses: ./.github/actions/install-linux-deps

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: desktop/web/package-lock.json

      - name: Install frontend deps
        run: npm ci --prefix desktop/web

      - name: Check generated transport bindings
        run: npm run check:types --prefix desktop/web

      - name: TypeScript check
        run: npx --prefix desktop/web tsc --noEmit -p desktop/web/tsconfig.json

  test:
    runs-on: ubuntu-latest
    env:
      CANOPI_SKIP_BUNDLED_DB: "1"
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Install Linux dependencies
        uses: ./.github/actions/install-linux-deps

      - name: Rust tests
        run: cargo test --workspace

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: desktop/web/package-lock.json

      - name: Install frontend deps
        run: npm ci --prefix desktop/web

      - name: Frontend tests
        run: npm test --prefix desktop/web

      - name: Frontend build
        run: npm run build --prefix desktop/web

  test-platform:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            package: lib-c
          - os: macos-14
            package: lib-swift
          - os: windows-latest
            package: lib-cpp

    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        uses: ./.github/actions/install-linux-deps

      - name: Platform-specific tests (${{ matrix.package }})
        run: cargo test -p ${{ matrix.package }}

  build:
    needs: [lint, test, test-platform]
    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            bundle_args: --bundles deb appimage
          - os: macos-14
            target: aarch64-apple-darwin
            bundle_args: ""
          - os: macos-15-intel
            target: x86_64-apple-darwin
            bundle_args: ""
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            bundle_args: ""

    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        uses: ./.github/actions/install-linux-deps

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: desktop/web/package-lock.json

      - name: Install frontend deps
        run: npm ci --prefix desktop/web

      - name: Download bundled plant DB
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          mkdir -p desktop/resources
          gh release download "$CANOPI_CORE_DB_RELEASE_TAG" \
            --repo "$GITHUB_REPOSITORY" \
            --pattern "$CANOPI_CORE_DB_ASSET_NAME" \
            --dir desktop/resources
          test -s "desktop/resources/$CANOPI_CORE_DB_ASSET_NAME"

      - name: Build Tauri app
        run: npx --prefix desktop/web @tauri-apps/cli build --target ${{ matrix.target }} ${{ matrix.bundle_args }}

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: canopi-${{ matrix.target }}
          path: |
            target/${{ matrix.target }}/release/bundle/**/*.deb
            target/${{ matrix.target }}/release/bundle/**/*.AppImage
            target/${{ matrix.target }}/release/bundle/**/*.dmg
            target/${{ matrix.target }}/release/bundle/**/*.msi
            target/${{ matrix.target }}/release/bundle/**/*.exe
          if-no-files-found: error
