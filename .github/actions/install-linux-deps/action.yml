name: Install Linux dependencies
description: Install the shared Ubuntu packages needed by CI and release packaging.

runs:
  using: composite
  steps:
    - name: Install apt packages
      shell: bash
      run: |
        set -euo pipefail
        sudo apt-get update
        sudo apt-get install -y \
          pkg-config \
          libcairo2-dev \
          libglib2.0-dev \
          libgtk-3-dev \
          libwebkit2gtk-4.1-dev \
          librsvg2-dev \
          patchelf
